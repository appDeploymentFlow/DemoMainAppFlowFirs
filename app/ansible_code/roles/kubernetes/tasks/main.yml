# sudo mkdir -p /etc/containerd

- name: create containerd directory
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"

# containerd config default |sudo tee /etc/containerd/config.toml

- name: generate containerd config default file
  ansible.builtin.shell: "containerd config default > /etc/containerd/config.toml"
  args: 
    creates: /etc/containerd/config.toml

# set -i 's/SystemdCgroup=false/SystemdCgroup=true/' >> /etc/containerd/config.toml
#regexp
# ^abc → Matches lines starting with "abc"
# xyz$ → Matches lines ending with "xyz"
# ^ and $ → Ensures whole line match
# \s* → Matches zero or more spaces
# - name: enable SystemCgroup in containerd
#   ansible.builtin.replace:
#     path: /etc/containerd/config.toml
#     regexp: '^SystemdCgroup\s*=\s*false$'
#     replace: '^SystemdCgroup\s*=\s*true$'

- name: enable SystemCgroup in containerd
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    regexp: '^SystemdCgroup\s*=\s*false$'
    line: 'SystemdCgroup = true'

# sudo systemctl restart containerd
# sudo systemctl enable containerd 

- name: start and enabled containerd
  ansible.builtin.systemd_service:
    name: containerd
    state: started
    enabled: true

# sudo apt install -y apt-transport-https ca-certificates curl software-properties-common

- name: install pre-request packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - software-properties-common
    state: present
    update_cache: yes

# curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key | sudo gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg

- name: creating apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
    owner: root
    group: root
- name: Download Kubernetes GPG key
  ansible.builtin.get_url:
    url: https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
    dest: /tmp/kubernetes.key
    mode: "0644"
- name: Convert GPG key to binary format and save to keyring
  ansible.builtin.command:
    cmd: gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg /tmp/kubernetes.key
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

# echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /" | sudo tee /etc/apt/sources.list.d/kubernetes.list

- name: create kubernetes repository file
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /"
    state: present
    filename: kubernetes.list

# sudo apt update
# sudo apt install -y kubelet kubeadm kubectl

- name: install kubeadm, kubelet and kubectl
  ansible.builtin.apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    update_cache: yes

# sudo apt-mark hold kubelet kubeadm kubectl

- name: mark hold
  ansible.builtin.command:
    cmd: sudo apt-mark hold kubelet kubeadm kubectl

# sudo kubeadm init --pod-network-cidr=192.168.0.0/16  

- name: initialize the cluster
  ansible.builtin.command:
    cmd: sudo kubeadm init --pod-network-cidr=192.168.0.0/16

# mkdir -p $HOME/.kube && sudo cp -i /etc/kubernetes/admin.conf $HOME/.kube/config
# sudo chown $(id -u):$(id -g) $HOME/.kube/config

- name: making setup for kubernetes
  ansible.builtin.command:
    argv:
      - mkdir -p $HOME/.kube
      - cp -i /etc/kubernetes/admin.conf $HOME/.kube/config
      - chown $(id -u):$(id -g) $HOME/.kube/config

# kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.27.0/manifests/calico.yaml

- name: install network plugins
  ansible.builtin.command:
    cmd: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.27.0/manifests/calico.yaml