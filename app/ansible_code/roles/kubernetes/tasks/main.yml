# - name: disable swap
#   ansible.builtin.shell: sudo sed -i '/ swap / s/^\$$.*\$$$/#\\1/g' /etc/fstab && sudo swapoff -a
#   args:
#     executable: /bin/bash

- name: Disable swap
  ansible.posix.mount:
    name: "{{ item }}"
    fstype: swap
    state: absent
  loop:
    - swap
    - none 

