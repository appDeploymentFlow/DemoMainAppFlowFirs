# Update the package index: sudo apt update
# Install kubeadm, kubelet, and kubectl: sudo apt install -y kubelet kubeadm kubectl
# Hold the packages to prevent accidental upgrades: sudo apt-mark hold kubelet kubeadm kubectl
# Disable swap: sudo sed -i '/ swap / s/^\$$.*\$$$/#\\1/g' /etc/fstab and sudo swapoff -a
# Enable required kernel modules and sysctl settings:
# sudo modprobe overlay
# sudo modprobe br_netfilter
