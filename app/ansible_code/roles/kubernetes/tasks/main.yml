# sudo sysctl --system
#On Ubuntu 24.04, the net.bridge parameters often fail if the br_netfilter kernel module isn't loaded first.

- name: Ensure br_netfilter module is loaded
  community.general.modprobe:
    name: br_netfilter
    state: present
  become: true

#Using sysctl_set: true (as added above) is a safety net—it tells Ansible to verify the value was actually set in the kernel, not just written to a file.

- name: Enable networking sysctl parameters
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: '1'
    reload: true
  loop:
    - net.bridge.bridge-nf-call-ip6tables
    - net.bridge.bridge-nf-call-iptables
    - net.ipv4.ip_forward
  become: true

# sudo apt install -y containerd

- name: install containerd
  ansible.builtin.apt:
    name:
      - containerd
    state: present
    update_cache: yes

