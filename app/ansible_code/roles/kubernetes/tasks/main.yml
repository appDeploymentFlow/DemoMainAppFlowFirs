- name: Disable swap
  ansible.posix.mount:
    name: "{{ item }}"
    fstype: swap
    state: absent
  loop:
    - swap
    - none 

- name: Set hostname for kubernetes
  ansible.builtin.hostname:
    name: "{{ k8s_hostname }}"          #value comes from default/main.yml
    use: systemd
  become: true

