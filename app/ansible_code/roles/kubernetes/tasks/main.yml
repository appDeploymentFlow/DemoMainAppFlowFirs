- name: add modules into kubernetes
  ansible.builtin.template:
    src: modules.conf
    dest: /etc/modules-load.d/kubernetes.conf

# sudo modprobe overlay
# sudo modprobe br_netfilter

- name: Enable kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

