#default variables, if i forget to pass these variable value while running "ansible-pull..." then these
#values taken by tasks/main.yml file (main script file)
hostname: "master-node"

# Set to true if running on AWS/Azure/GCP to prevent cloud-init resets
# is_cloud_instance: false


##can be override using "-e" tag like
#ansible-pull -U https://${1}:${2}@github.com/appDeploymentFlow/DemoMainAppFlowFirs.git -d /tmp/ansible_pull_cache -i localhost, -e "COMPONENT=${3}" -e "hostname=master-node" app/ansible_code/playbook.yml
#OR
#ansible-pull -U https://${1}:${2}@github.com/appDeploymentFlow/DemoMainAppFlowFirs.git -d /tmp/ansible_pull_cache -i localhost, -e "COMPONENT=${3} hostname=master-node" app/ansible_code/playbook.yml