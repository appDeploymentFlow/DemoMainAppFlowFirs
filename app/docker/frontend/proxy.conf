server {
    listen 80;
    server_name 44.213.249.248                    #enter host ip where install docker

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;             #try_files means If file exists → serve it, If not → serve index.html
    }

    location /api/ {
        proxy_pass http://backend:8080/;
    }
}
