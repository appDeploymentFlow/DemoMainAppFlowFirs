name: make deployment to expense app using docker containers
on:
  push:
    branches: ["main"]
defaults:
  run:
    shell: bash
jobs:
  compile:
    runs-on: ['workStation01']
    steps:
      - name: checkout git repo code
        uses: actions/checkout@v5
      - name: compile code
        run: echo 'code is compiled'
  create_infra:
    runs-on: ['workStation01']
    needs: ['compile']
    steps:
      - name: checkout git repo code
        uses: actions/checkout@v5
      - name: creating worker01 server for deployment
        # env:
        #   ACCESS_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
        #   USER: ${{ secrets.REPO_USER_NAME }}
        #   SSH_PASS: ${{ secrets.WORKER01_SSH_PASS }}
        #run: bash app/terraform_code/create.sh $SSH_PASS $USER $ACCESS_TOKEN kubernetes
        env:              #define variable with "TF_VAR_var-name-define-file" can be taken automatically by terraform
          TF_VAR_access_git: ${{ secrets.REPO_ACCESS_TOKEN }}
          TF_VAR_user_git: ${{ secrets.REPO_USER_NAME }}
          TF_VAR_ssh_pass: ${{ secrets.WORKER01_SSH_PASS }}
          TF_VAR_ansible_role: "docker"
        run: |
          cd app/terraform_code
          terraform init
          terraform plan
          terraform apply -auto-approve
