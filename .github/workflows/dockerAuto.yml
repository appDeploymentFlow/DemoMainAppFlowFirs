name: make deployment to expense app using docker containers
on:
  push:
    branches: ["main"]
defaults:
  run:
    shell: bash
jobs:
  compile:
    runs-on: ['workStation01']
    steps:
      - name: checkout git repo code
        uses: actions/checkout@v4
      - name: compile code
        run: echo 'code is compiled'
  create_infra:
    runs-on: ['workStation01']
    needs: ['compile']
    steps:
      - name: checkout git repo code
        uses: actions/checkout@v4
      - name: setup terraform
        uses: hashicorp/setup-terraform@v3
      - name: creating worker01 server for deployment
        #run: bash app/terraform_code/create.sh
        run: echo 'infra is already created'
  configure_packages:
    runs-on: ['workStation01']
    needs: ['create_infra']
    steps:
      - name: checkout git repo code
        uses: actions/checkout@v4
      - name: setup python
        uses: actions/setup-python@v5
      - name: get secretes
        env:
          access_token: ${{ secrets.REPO_ACCESS_TOKEN }}
        run: bash app/ansible_code/init.sh "$access_token"
